<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CyberSafe Diagnostics</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #111827;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #10b981;
      --warning: #ef4444;
      --border: rgba(255, 255, 255, 0.1);
    }
    
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    .container {
      padding: 16px;
      background: linear-gradient(to bottom, var(--card-bg), var(--bg-color));
      border-bottom: 2px solid var(--accent);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-container {
      width: 36px;
      height: 36px;
      background-color: #000;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container svg {
      color: var(--accent);
      width: 20px;
      height: 20px;
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: bold;
    }

    .subtitle {
      margin: 0;
      font-size: 12px;
      color: var(--text-muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .status-panel {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .status-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .engine-status {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    
    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    .error-pulse {
      background-color: var(--warning);
      box-shadow: 0 0 8px var(--warning);
    }
    
    .error-text {
      color: var(--warning);
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .action-button {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-button:hover {
      background-color: rgba(16, 185, 129, 0.1);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
    }

    .info-text {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <!-- Shield Icon from Lucide -->
        <svg xmlns="http://www.w3.org/-2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
        </svg>
      </div>
      <div>
        <h1 class="title">CyberSafe</h1>
        <p class="subtitle">Real-time URL Scanning</p>
      </div>
    </div>

    <div class="status-panel">
      <div class="status-header">
        <span class="engine-status">Engine Connection</span>
        <div class="status-indicator" id="connection-status">
          <div class="pulse" id="pulse-indicator"></div>
          <span id="status-text">CONNECTING</span>
        </div>
      </div>
    </div>

    <button class="action-button" id="force-scan-btn">Force Full Scan</button>
    
    <p class="info-text">
      Requires localhost:3000 to be running.
    </p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
